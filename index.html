
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PharmaFlow</title>
    
    <!-- PWA & Mobile Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1E4D4D">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PharmaFlow">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
          --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
          --safe-area-inset-top: env(safe-area-inset-top, 0px);
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f1f5f9; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            padding-top: var(--safe-area-inset-top);
            display: flex;
            justify-content: center;
        }

        #root {
            width: 100%;
            max-width: 480px;
            background-color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            margin: 0 auto;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 480px) {
            #root {
                box-shadow: none;
                max-width: 100% !important;
            }
        }
        
        .safe-area-pb {
            padding-bottom: calc(1.5rem + var(--safe-area-inset-bottom));
        }

        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }

        input:focus, select:focus, textarea:focus {
            outline: none !important;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        
        button:active {
            transform: scale(0.94);
            opacity: 0.8;
            transition: all 0.1s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .bottom-sheet {
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* الطباعة الذكية للموبايل والبلوتوث */
        @media print {
            body { background: white !important; padding: 0 !important; }
            header, aside, footer, .no-print, button, nav { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; width: 100% !important; }
            .print-area { display: block !important; width: 100% !important; }
            #root > div > div:not(.print-container) { display: none !important; }
        }
    </style>
</head>
<body class="bg-[#F8FAFA] text-slate-900 min-h-screen overflow-hidden select-none">
    <div id="root"></div>
    <script>
      // SYNCHRONOUS BOOTSTRAPPING & RECOVERY SYSTEM
      (function() {
        const isDev = window.location.hostname === 'localhost' || 
                      window.location.hostname.includes('127.0.0.1') || 
                      window.location.hostname.includes('ais-dev');
        
        console.log('[BOOT] Initializing Startup Diagnostics. Environment:', isDev ? 'DEVELOPMENT' : 'PRODUCTION');

        if (isDev) {
          // 1. Force Synchronous React Refresh Preamble to bypass Vite Refresh error
          window.__vite_plugin_react_preamble_installed__ = true;
          window.$RefreshReg$ = function() {};
          window.$RefreshSig$ = function() { return function(type) { return type; }; };
          console.log('[BOOT] Synchronous React Refresh Mock Preamble installed.');

          // 2. Immediate asynchronous cleanup of service workers to bypass dev cache pollution
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              for (var i = 0; i < regs.length; i++) {
                regs[i].unregister().then(function() {
                  console.log('[BOOT] Unregistered corrupted Service Worker.');
                });
              }
            });
          }

          // 3. Clear Caches immediately to remove broken SPA bundles and stale HTML versions
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(key) {
                caches.delete(key).then(function() {
                  console.log('[BOOT] Cleared Cache Storage:', key);
                });
              });
            });
          }
        } else if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('./sw.js')
              .then(function() { console.log('[PWA] Active'); })
              .catch(function(err) { console.warn('[PWA] Failed to load', err); });
          });
        }
      })();
    </script>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
