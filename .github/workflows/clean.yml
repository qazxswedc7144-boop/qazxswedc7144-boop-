name: Auto Clean Duplicates
on:
  workflow_dispatch: # يتيح لك تشغيله بضغطة زر يدوياً في أي وقت

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run Cleaner Script
        run: python scripts/find_duplicates.py
      - name: Commit and Push Clean Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "تطهير كامل للمستودع وحذف الملفات المكررة"
          
